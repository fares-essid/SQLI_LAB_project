<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel SQLi Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; max-width: 800px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .result-box { background: #fff; padding: 20px; border-left: 5px solid #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h2 class="text-center mb-4">🛡️ User Search Portal</h2>
            <p class="text-muted text-center">Enter a User ID to fetch profile details.</p>
            
            <form action="/user" method="GET" class="input-group mb-3">
                <input type="text" name="id" class="form-control" placeholder="Try '1' or '1 OR 1=1'..." required>
                <button class="btn btn-primary" type="submit">Search</button>
            </form>

            {% if data %}
            <div class="result-box mt-4">
                <h4>Search Results:</h4>
                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>Field 1 (Username)</th>
                            <th>Field 2 (Email/Data)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in data %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% endif %}
            
            <div class="mt-4 p-3 bg-light border rounded">
                <h5>Last Executed Query:</h5>
                <code class="text-danger">{{ query }}</code>
            </div>
        </div>
    </div>
</body>
</html>
